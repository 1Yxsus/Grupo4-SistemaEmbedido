<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analizador de Madurez - Plátanos</title>
    <style>
      :root {
        --primary: #f1c40f;
        --primary-dark: #d4ac0d;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --text: #2c3e50;
        --success: #2ecc71;
        --danger: #e74c3c;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 550px;
        margin: auto;
      }

      .card {
        background: var(--card-bg);
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        padding: 30px;
        text-align: center;
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 10px;
        color: #34495e;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #7f8c8d;
        margin-bottom: 25px;
      }

      /* Zona de carga de imagen */
      .drop-zone {
        border: 2px dashed #bdc3c7;
        border-radius: 10px;
        padding: 30px 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #fafafa;
        position: relative;
      }

      .drop-zone:hover,
      .drop-zone.drag-over {
        border-color: var(--primary-dark);
        background: #fffdf3;
      }

      .drop-zone input {
        display: none;
      }

      .preview-img {
        max-width: 100%;
        max-height: 250px;
        border-radius: 8px;
        display: none;
        margin-top: 15px;
      }

      .drop-zone-prompt {
        color: #7f8c8d;
        font-weight: 500;
      }

      /* Botón de envío */
      .btn {
        background-color: var(--primary);
        color: #fff;
        border: none;
        padding: 12px 25px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        margin-top: 20px;
        transition: background 0.2s;
        box-shadow: 0 4px 6px rgba(241, 196, 15, 0.2);
      }

      .btn:hover {
        background-color: var(--primary-dark);
      }

      .btn:disabled {
        background-color: #bdc3c7;
        box-shadow: none;
        cursor: not-allowed;
      }

      /* Spinner de carga */
      .loader {
        display: none;
        width: 30px;
        height: 30px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid var(--primary-dark);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 20px auto 0 auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Resultados */
      .result-container {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #edf2f7;
        display: none;
      }

      .badge {
        display: inline-block;
        padding: 6px 16px;
        border-radius: 20px;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.9rem;
        margin-top: 10px;
      }

      /* Colores dinámicos para las clases de plátano */
      .badge.unripe {
        background-color: #e8f8f5;
        color: #117a65;
      } /* Verde / Inmaduro */
      .badge.ripe {
        background-color: #fef9e7;
        color: #b7950b;
      } /* Amarillo / Maduro */
      .badge.overripe {
        background-color: #fdf2e9;
        color: #a04000;
      } /* Maduro con manchas */
      .badge.rotten {
        background-color: #fceae8;
        color: #922b21;
      } /* Podrido */

      .confidence-bar-container {
        background-color: #e9ecef;
        border-radius: 10px;
        height: 12px;
        width: 100%;
        margin-top: 15px;
        overflow: hidden;
      }

      .confidence-bar {
        background-color: var(--success);
        height: 100%;
        width: 0%;
        transition: width 0.5s ease;
      }

      .error-message {
        color: var(--danger);
        margin-top: 15px;
        font-size: 0.9rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Clasificador de Madurez con IA</h1>
        <p class="subtitle">Sube una imagen para testear el modelo ResNet18</p>

        <div class="drop-zone" id="dropZone">
          <span class="drop-zone-prompt"
            >Arrastra una imagen aquí o haz clic para buscar</span
          >
          <input type="file" id="imageInput" accept="image/*" />
          <img src="" alt="Vista previa" class="preview-img" id="previewImg" />
        </div>

        <button class="btn" id="uploadBtn" disabled>Analizar Imagen</button>
        <div class="loader" id="loader"></div>

        <div class="error-message" id="errorMsg"></div>

        <div class="result-container" id="resultContainer">
          <h3>Resultado del Análisis:</h3>
          <div id="resultBadge" class="badge">Analizando...</div>
          <p style="margin-top: 15px; font-size: 0.9rem; color: #555">
            Confianza: <strong id="confidenceText">0%</strong>
          </p>
          <div class="confidence-bar-container">
            <div class="confidence-bar" id="confidenceBar"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // URL de tu backend publicado en Render (Reemplázala con tu URL real de Render)
      const RENDER_API_URL = "https://detecciondefrutas.onrender.com/api/data";

      const dropZone = document.getElementById("dropZone");
      const imageInput = document.getElementById("imageInput");
      const previewImg = document.getElementById("previewImg");
      const uploadBtn = document.getElementById("uploadBtn");
      const loader = document.getElementById("loader");
      const errorMsg = document.getElementById("errorMsg");
      const resultContainer = document.getElementById("resultContainer");
      const resultBadge = document.getElementById("resultBadge");
      const confidenceText = document.getElementById("confidenceText");
      const confidenceBar = document.getElementById("confidenceBar");
      const dropZonePrompt = document.querySelector(".drop-zone-prompt");

      // Trigger de selección de archivo al hacer click en el área
      dropZone.addEventListener("click", () => imageInput.click());

      // Manejar el cambio de archivo (cuando el usuario selecciona una foto)
      imageInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          showPreview(file);
        }
      });

      // Eventos Drag & Drop visuales
      ["dragover", "dragenter"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          (e) => {
            e.preventDefault();
            dropZone.classList.add("drag-over");
          },
          false,
        );
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          (e) => {
            e.preventDefault();
            dropZone.classList.remove("drag-over");
          },
          false,
        );
      });

      // Manejar el archivo soltado en la zona
      dropZone.addEventListener("drop", (e) => {
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
          imageInput.files = e.dataTransfer.files;
          showPreview(file);
        }
      });

      // Mostrar la vista previa de la imagen cargada
      function showPreview(file) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = () => {
          previewImg.src = reader.result;
          previewImg.style.display = "block";
          dropZonePrompt.style.display = "none";
          uploadBtn.disabled = false; // Habilitar botón de análisis
          resetResults();
        };
      }

      function resetResults() {
        resultContainer.style.display = "none";
        errorMsg.style.display = "none";
      }

      // Enviar los datos al backend en Render
      uploadBtn.addEventListener("click", async () => {
        const file = imageInput.files[0];
        if (!file) return;

        // Construir el FormData idéntico al del ESP32-CAM (llave: 'image')
        const formData = new FormData();
        formData.append("image", file);

        // UI State: Cargando
        loader.style.display = "block";
        uploadBtn.disabled = true;
        resetResults();

        try {
          const response = await fetch(RENDER_API_URL, {
            method: "POST",
            body: formData,
            // No se pone "Content-Type", el navegador añade automáticamente el Boundary para FormData
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || "Error en el servidor");
          }

          // UI State: Éxito. Mostrar resultados obtenidos de tu JSON
          loader.style.display = "none";
          uploadBtn.disabled = false;
          resultContainer.style.display = "block";

          // Mapear predicción con estilos CSS creados arriba
          resultBadge.textContent = traducirEstado(data.prediccion);
          resultBadge.className = `badge ${data.prediccion}`;

          // Actualizar porcentaje y barra de confianza
          confidenceText.textContent = data.confianza;
          confidenceBar.style.width = `${data.confidence_valor || data.confianza_valor}%`;
        } catch (error) {
          // UI State: Error
          loader.style.display = "none";
          uploadBtn.disabled = false;
          errorMsg.textContent = `Hubo un problema: ${error.message}`;
          errorMsg.style.display = "block";
          console.error(error);
        }
      });

      // Pequeño helper para mostrarlo en español de forma elegante
      function traducirEstado(estado) {
        const traducciones = {
          unripe: "Inmaduro (Verde)",
          ripe: "Maduro",
          overripe: "Sobremaduro",
          rotten: "Podrido",
        };
        return traducciones[estado] || estado;
      }
    </script>
  </body>
</html>
